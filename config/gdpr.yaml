# ───────────────────────────────────────────────────────────────────────────
# PolicyChecker — Corpus Configuration for GDPR (Portability Experiment)
# ───────────────────────────────────────────────────────────────────────────
# This is a minimal config for testing pipeline portability on a non-AIT
# corpus. It demonstrates that the Corpus Adapter enables domain switching
# without Python code changes.
# ───────────────────────────────────────────────────────────────────────────

corpus:
  name: "gdpr"
  display_name: "GDPR - General Data Protection Regulation"
  namespace: "http://example.org/gdpr-policy#"
  prefix: "gdpr"

# ── File paths (relative to PROJECT_ROOT) ─────────────────────────────────
paths:
  pdf_dir: "institutional_policy/GDPR"
  ontology: "shacl/ontology/gdpr_policy_ontology.ttl"
  vocabulary: "shacl/ontology/gdpr_property_list.txt"
  gold_shapes: "shacl/shapes/gdpr_policy_shapes.ttl"
  test_data: "shacl/test_data/gdpr_test_data.ttl"

# ── FOL prompt customisation ─────────────────────────────────────────────
prompts:
  fol_examples:
    - text: "Data controllers must obtain explicit consent before processing personal data."
      deontic_type: "obligation"
      formula: "O(obtainExplicitConsent(dataController))"
      expansion: "∀x (DataController(x) → O(obtainExplicitConsent(x)))"
      action: "obtainExplicitConsent"

    - text: "Data subjects may request access to their personal data at any time."
      deontic_type: "permission"
      formula: "P(requestDataAccess(dataSubject))"
      expansion: "∀x (DataSubject(x) → P(requestDataAccess(x)))"
      action: "requestDataAccess"

    - text: "Organizations must not transfer personal data to third countries without adequate safeguards."
      deontic_type: "prohibition"
      formula: "F(transferDataWithoutSafeguards(organization))"
      expansion: "∀x (Organization(x) → F(transferDataWithoutSafeguards(x)))"
      action: "transferDataWithoutSafeguards"

# ── SHACL target class mapping ────────────────────────────────────────────
target_class_patterns:
  - pattern: "data controller(s?)|controller(s?)"
    class: "DataController"
  - pattern: "data processor(s?)|processor(s?)"
    class: "DataProcessor"
  - pattern: "data subject(s?)|individual(s?)|citizen(s?)"
    class: "DataSubject"
  - pattern: "organization(s?)|company|companies|enterprise(s?)"
    class: "Organization"
  - pattern: "supervisory authority|authority|authorities"
    class: "SupervisoryAuthority"
  - pattern: "data protection officer|dpo"
    class: "DataProtectionOfficer"

# ── Domain vocabulary for keyword matching ────────────────────────────────
domain_words:
  - consent
  - processing
  - personal
  - data
  - controller
  - processor
  - subject
  - transfer
  - access
  - rectification
  - erasure
  - portability
  - breach
  - notification
  - impact
  - assessment
  - safeguard
  - legitimate
  - interest
  - purpose
  - limitation
  - minimization
  - accuracy
  - storage
  - integrity
  - confidentiality
  - accountability
  - lawful
  - fair
  - transparent
  - automated
  - profiling
  - restriction
  - objection
  - supervisory
  - authority
  - representative
  - record
  - security
  - pseudonymization
  - encryption
  - certification

# ── Extra stop words (corpus-specific) ────────────────────────────────────
stop_words_extra:
  - regulation
  - article
  - paragraph
  - member
  - state
  - union
  - european
  - eu
  - gdpr
