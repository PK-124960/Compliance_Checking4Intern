services:
  dev:
    image: compliance-checker:latest
    container_name: compliance-checker-dev
    build:
      context: .
      dockerfile: dockerfile
      args:
        - BUILD_VERSION=DEV
        - WORKDIR=/Projects/compliance-checker
    ports:
      - 8000:8000
    env_file:
      - .env
    environment:
      # Override to use service names instead of localhost
      - POSTGRES_HOST=postgres
    volumes:
      # Team convention: mount entire project folder
      - .:/Projects/compliance-checker:cached
      # Team convention: named volumes for caching
      - venv:/Projects/compliance-checker/.venv
      - python:/Projects/compliance-checker/.python
      - uv_cache:/Projects/compliance-checker/.uv_cache
      # Team convention: forward Docker socket
      - /var/run/docker.sock:/var/run/docker-host.sock
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ait_database}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run schema on first start
      - ./src/policy_checker/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  venv:           # team convention: cache .venv
  python:         # team convention: cache uv-managed Python
  uv_cache:       # team convention: cache uv download cache
  postgres_data:
  ollama_data: