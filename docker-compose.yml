# =============================================================================
# PolicyChecker — Docker Compose
# =============================================================================
# Spins up PostgreSQL + the PolicyChecker web dashboard.
# GraphDB and Ollama are included as optional services.
#
# Quick start:
#   docker compose up -d postgres       # just the database
#   docker compose up -d                # everything
#   docker compose exec app python -m db.seed  # seed demo data
#
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: policychecker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ait_database}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mysecretpassword}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ait_database}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PolicyChecker Web App ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: policychecker-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ait_database}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mysecretpassword}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      OLLAMA_SECOND_MODEL: ${OLLAMA_SECOND_MODEL:-mistral}
      OLLAMA_SEED: ${OLLAMA_SEED:-42}
      PIPELINE_VERSION: ${PIPELINE_VERSION:-2.1-hints}
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./cache:/app/cache
      - ./institutional_policy:/app/institutional_policy

  # ── GraphDB (optional — for RDF triple store) ──────────────────────────
  graphdb:
    image: ontotext/graphdb:10.6.0
    container_name: policychecker-graphdb
    restart: unless-stopped
    ports:
      - "7200:7200"
    volumes:
      - graphdb_data:/opt/graphdb/home
    profiles:
      - graphdb

  # ── Ollama (optional — for local LLM inference) ────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: policychecker-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  pgdata:
  graphdb_data:
  ollama_data:
